<!DOCTYPE html>
<html>
<head>
    <title>WebSocket STOMP Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
</head>
<body>
<h1>WebSocket STOMP Real-time Notification Test</h1>
<div>
    <label for="token">JWT Token:</label>
    <input type="text" id="token" placeholder="Enter your Bearer token here" style="width: 500px;">
    <button onclick="connect()">Connect</button>
    <button onclick="disconnect()" disabled>Disconnect</button>
</div>
<hr>
<h3>Logs:</h3>
<div id="logs" style="border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll;"></div>

<script>
    let stompClient = null;

    function log(message) {
        const logsDiv = document.getElementById('logs');
        logsDiv.innerHTML += `<p>${new Date().toLocaleTimeString()}: ${message}</p>`;
        logsDiv.scrollTop = logsDiv.scrollHeight;
    }

    function connect() {
        const jwtToken = document.getElementById('token').value;
        if (!jwtToken) {
            alert('Please enter a JWT token.');
            return;
        }

        stompClient = new StompJs.Client({
            webSocketFactory: () => new SockJS('http://localhost:8080/ws'),
            connectHeaders: {
                Authorization: `Bearer ${jwtToken}`
            },
            debug: (str) => {
                log(`DEBUG: ${str}`);
            },
            reconnectDelay: 5000,
        });

        stompClient.onConnect = (frame) => {
            log('✅ Successfully connected to WebSocket server!');
            document.querySelector('button[onclick="connect()"]').disabled = true;
            document.querySelector('button[onclick="disconnect()"]').disabled = false;

            // 개인 알림 채널 구독
            stompClient.subscribe('/user/queue/notifications', (message) => {
                const notification = JSON.parse(message.body);
                log(`📩 New notification received: <pre>${JSON.stringify(notification, null, 2)}</pre>`);
            });
            log('🎧 Subscribed to /user/queue/notifications');
        };

        stompClient.onStompError = (frame) => {
            log(`❌ Broker reported error: ${frame.headers['message']}`);
            log(`Additional details: ${frame.body}`);
        };

        stompClient.activate();
        log('🚀 Attempting to connect...');
    }

    function disconnect() {
        if (stompClient !== null) {
            stompClient.deactivate();
        }
        log("🔌 Disconnected.");
        document.querySelector('button[onclick="connect()"]').disabled = false;
        document.querySelector('button[onclick="disconnect()"]').disabled = true;
    }
</script>
</body>
</html>
